<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Flow Pro - Task Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-color: #f3f4f6;
            --app-bg: rgba(255, 255, 255, 0.85);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --accent-color: #f43f5e;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --border-color: rgba(226, 232, 240, 0.8);
            --card-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
            --glass-border: rgba(255, 255, 255, 0.5);
            --input-bg: rgba(255, 255, 255, 0.9);
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --app-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary-color: #818cf8;
            --primary-hover: #6366f1;
            --accent-color: #fb7185;
            --success-color: #34d399;
            --warning-color: #fbbf24;
            --border-color: rgba(51, 65, 85, 0.8);
            --card-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(15, 23, 42, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background: var(--bg-color);
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 2rem; color: var(--text-primary);
        }

        .app-container {
            width: 100%; max-width: 650px; background: var(--app-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 2rem;
            box-shadow: var(--card-shadow); display: flex; flex-direction: column; gap: 1.2rem;
        }

        .app-header { display: flex; justify-content: space-between; align-items: center; }
        .app-header h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--primary-color), var(--accent-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .theme-toggle { width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; background: var(--input-bg); border: 1px solid var(--border-color); cursor: pointer; color: var(--text-primary); }

        .chart-container { background: var(--input-bg); border-radius: 20px; border: 1px solid var(--border-color); padding: 1rem; height: 180px; }

        .input-group { display: flex; flex-direction: column; gap: 0.8rem; background: var(--input-bg); padding: 1.2rem; border-radius: 16px; border: 1px solid var(--border-color); }
        .input-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 0.5rem; }
        
        #taskInput, .select-input, .time-input { padding: 0.8rem; border-radius: 10px; border: 1px solid var(--border-color); background: var(--app-bg); color: var(--text-primary); font-size: 0.85rem; }
        .add-btn { width: 45px; border: none; border-radius: 10px; background: var(--primary-color); color: white; cursor: pointer; transition: 0.3s; }
        .add-btn:hover { background: var(--primary-hover); transform: scale(1.05); }

        .task-list { list-style: none; display: flex; flex-direction: column; gap: 0.8rem; max-height: 350px; overflow-y: auto; padding-right: 5px; }
        .task-item { background: var(--input-bg); border: 1px solid var(--border-color); padding: 1rem; border-radius: 18px; display: flex; flex-direction: column; gap: 0.5rem; border-left: 6px solid transparent; transition: 0.3s; }
        
        .priority-high { border-left-color: var(--accent-color); }
        .priority-medium { border-left-color: var(--warning-color); }
        .priority-low { border-left-color: var(--success-color); }

        .task-main { display: flex; justify-content: space-between; align-items: flex-start; }
        .category-badge { font-size: 0.6rem; padding: 2px 8px; border-radius: 20px; background: rgba(99, 102, 241, 0.1); color: var(--primary-color); text-transform: uppercase; font-weight: 700; }
        .time-badge { font-size: 0.75rem; color: var(--text-secondary); margin-left: 8px; }
        .task-text { font-weight: 600; margin-top: 4px; }
        
        .progress-container { display: flex; align-items: center; gap: 10px; }
        .slider { flex: 1; height: 5px; cursor: pointer; accent-color: var(--primary-color); }
        .delete-btn { color: var(--text-secondary); cursor: pointer; border: none; background: none; font-size: 1.1rem; }

        .completed { opacity: 0.5; }
        .completed .task-text { text-decoration: line-through; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <div>
                <h1>Daily Flow Pro</h1>
                <p id="dateDisplay" style="color: var(--text-secondary); font-size: 0.85rem;"></p>
            </div>
            <div class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></div>
        </header>

        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a task...">
            <div class="input-row">
                <select id="categorySelect" class="select-input">
                    <option value="Work">Work</option>
                    <option value="Study">Study</option>
                    <option value="Personal">Personal</option>
                </select>
                <select id="prioritySelect" class="select-input">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
                <input type="time" id="taskTime" class="time-input">
                <button id="addTaskBtn" class="add-btn"><i class="fas fa-plus"></i></button>
            </div>
        </div>

        <ul class="task-list" id="taskList"></ul>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('df_v5_tasks')) || [];
        let myChart = null;

        function init() {
            updateDate();
            checkNotificationPermission(); // නිවැරදි කරන ලද කොටස
            renderTasks();
            initChart();
            initTheme();
            setInterval(checkAlarms, 20000); // Check every 20s
        }

        function checkNotificationPermission() {
            // දැනටමත් අවසර දී නැත්නම් හෝ අවහිර කර නැත්නම් පමණක් අසන්න
            if (Notification.permission !== "granted" && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
        }

        function updateDate() {
            document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
        }

        function addTask() {
            const text = document.getElementById('taskInput').value.trim();
            const time = document.getElementById('taskTime').value;
            if (!text || !time) return;

            const newTask = {
                id: Date.now().toString(),
                text: text,
                time: time,
                category: document.getElementById('categorySelect').value,
                priority: document.getElementById('prioritySelect').value,
                progress: 0,
                notified: false
            };

            tasks.unshift(newTask);
            saveAndRefresh();
            document.getElementById('taskInput').value = '';
        }

        function checkAlarms() {
            const now = new Date();
            const currentTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

            tasks.forEach(task => {
                if (!task.notified && task.time === currentTime && task.progress < 100) {
                    if (Notification.permission === "granted") {
                        new Notification("Daily Flow: " + task.category, {
                            body: `Time to: ${task.text}`,
                            icon: "https://cdn-icons-png.flaticon.com/512/906/906334.png"
                        });
                    }
                    task.notified = true;
                    saveAndRefresh();
                }
            });
        }

        function updateProgress(id, val) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.progress = parseInt(val);
                saveAndRefresh();
            }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('df_v5_tasks', JSON.stringify(tasks));
            renderTasks();
            updateChart();
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `task-item priority-${task.priority} ${task.progress === 100 ? 'completed' : ''}`;
                li.innerHTML = `
                    <div class="task-main">
                        <div>
                            <span class="category-badge">${task.category}</span>
                            <span class="time-badge"><i class="far fa-clock"></i> ${task.time}</span>
                            <div class="task-text">${task.text}</div>
                        </div>
                        <button class="delete-btn" onclick="deleteTask('${task.id}')"><i class="fas fa-trash-alt"></i></button>
                    </div>
                    <div class="progress-container">
                        <input type="range" class="slider" min="0" max="100" value="${task.progress}" onchange="updateProgress('${task.id}', this.value)">
                        <span style="font-size: 0.75rem; font-weight: bold;">${task.progress}%</span>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Tasks Progress'],
                    datasets: [{
                        data: [0],
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true, tension: 0.4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, max: 100, ticks: { display: false } }, x: { display: false } }
                }
            });
            updateChart();
        }

        function updateChart() {
            if (!myChart) return;
            // ප්‍රගතිය පෙන්වීමට අවසාන ටාස්ක් 5ක දත්ත ගනිමු
            const lastTasks = tasks.slice(0, 5).reverse();
            myChart.data.labels = lastTasks.map(t => t.time);
            myChart.data.datasets[0].data = lastTasks.map(t => t.progress);
            myChart.update();
        }

        document.getElementById('addTaskBtn').addEventListener('click', addTask);
        document.getElementById('themeToggle').addEventListener('click', () => {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        });

        function initTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
        }

        init();
    </script>
</body>
</html>
